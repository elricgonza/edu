{% extends "base.html" %}
{% from "partials/macros.html" import breadcrumb %}
{% block page_title %}Cambiar Contraseña{% endblock %}
{% block content %}
{{ breadcrumb([('Inicio', '/'), ('Cambiar Contraseña', '#')]) }}
<div class="max-w-md"><div class="card">
  <h2 class="font-heading font-bold text-slate-800 mb-6">Cambiar Contraseña</h2>
  <form method="POST"><div class="space-y-5">
    <div><label class="form-label">Contraseña Actual</label><input type="password" name="password_actual" required class="form-input"></div>
    <div><label class="form-label">Nueva Contraseña</label><input type="password" name="password_nueva" required minlength="6" class="form-input"></div>
    <div><label class="form-label">Confirmar Nueva Contraseña</label><input type="password" name="confirmar" required class="form-input"></div>
  </div><div class="flex gap-3 mt-8">
    <button type="submit" class="btn-primary">Actualizar Contraseña</button>
    <a href="/" class="btn-secondary">Cancelar</a>
  </div></form>
</div></div>
{% endblock %}
